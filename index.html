// AUDIT-OR: Cross-border deposit fraud detection
function auditORDetectFraud(metrics) {
    if (!metrics) return { detected: false };
    const fraudScore = (metrics.food || 0) * 0.12 + (metrics.structures || 0) * 0.08;
    if (fraudScore > 25) {
        console.log('%c🚨 AUDIT-OR FRAUD DETECTED - Score: ' + fraudScore.toFixed(1), 'color:#ff4444;font-weight:bold');
        return { detected: true, fraudScore: fraudScore.toFixed(2) };
    }
    return { detected: false };
}

// ENHANCED ECON-CB
const econAgentLogic = {
    executeTick: function(metrics, population, structuresByVael) {
        let food = (metrics.food || 0) + population * 0.5;
        let knowledge = (metrics.knowledge || 0) + (metrics.technology || 0) * 1.2;

        if ((metrics.culture || 0) < (metrics.technology || 0)) {
            food *= 0.8;
            metrics.culture = (metrics.culture || 0) + 5;
        } else {
            metrics.food = food;
            metrics.knowledge = knowledge;
        }

        metrics.technology = Math.min(100, (metrics.technology || 0) + (structuresByVael || 0) * 0.8);
        return metrics;
    }
};

// HANDLE AGENT DECISION
function handleAgentDecision(rawResponse, agentName = "Unknown") {
    try {
        const decision = typeof rawResponse === "string" ? JSON.parse(rawResponse) : rawResponse;
        console.log(`%c[${agentName}] Decision: ${decision.action || "IDLE"}`, "color:#00ffcc");
        
        const logEl = document.getElementById("log") || document.getElementById("decision-log") || document.getElementById("agent-decision-log");
        if (logEl) {
            const entry = document.createElement("div");
            entry.className = "log-entry";
            entry.textContent = `T${Date.now() % 999} | ${agentName} → ${decision.action || "IDLE"}`;
            logEl.appendChild(entry);
            logEl.scrollTop = logEl.scrollHeight;
        }
        return decision;
    } catch (e) {
        console.error("handleAgentDecision failed", e);
        return { action: "IDLE", reasoning: "Parse error" };
    }
}
